<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Tasks | TeamFlow Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/tasks.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">TeamFlow Hub</div>
        <nav>
          <a data-nav-link href="dashboard.html">Dashboard</a>
          <a data-nav-link href="teams.html">Teams</a>
          <a data-nav-link href="tasks.html">Tasks</a>
          <a data-nav-link href="users.html">Users</a>
          <a data-nav-link href="../shared/profile.html">Profile</a>
          <a data-nav-link href="../shared/notifications.html">Notifications</a>
          <a href="#" data-action="logout">Logout</a>
        </nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <h2>Task Management</h2>
          <div class="topbar-right">
            <a class="notification-link" aria-label="Notifications" href="../shared/notifications.html">
              Notifications
              <span class="count-pill" data-notification-count>0</span>
            </a>
            <div class="user-chip">
              <img data-current-avatar src="https://placehold.co/40x40" alt="avatar" />
              <div><strong data-current-user>-</strong><div data-current-role>-</div></div>
            </div>
          </div>
        </header>

        <section>
          <article class="card tasks-main-card table-card-full">
            <div class="section-head section-head-wrap">
              <div>
                <h3>Tasks</h3>
                <p class="muted-note">Create tasks from one button, then view, edit, and manage details in dialogs.</p>
              </div>
              <button id="open-create-task-modal" class="btn btn-primary" type="button">Create Task</button>
            </div>

            <div class="task-filters-wrap">
              <div class="filters">
                <input id="task-search" type="text" placeholder="Search by title" />
                <select id="task-status-filter">
                  <option value="">All Status</option>
                  <option value="todo">Todo</option>
                  <option value="in-progress">In Progress</option>
                  <option value="done">Done</option>
                </select>
                <select id="task-priority-filter">
                  <option value="">All Priority</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
                <select id="task-team-filter"></select>
              </div>
            </div>

            <div class="table-shell">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Team</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Created By</th>
                    <th>Assigned To</th>
                    <th>Type</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tasks-table-body"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../../js/socket.js"></script>
    <script src="../../js/notifications.js"></script>
    <script src="../../js/tasks.js"></script>
    <script>
      window.TeamFlow.tasks.init("manager");
    </script>
  </body>
</html>
