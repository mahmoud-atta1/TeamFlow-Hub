<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | TeamFlow Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/notifications.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">TeamFlow Hub</div>
        <nav data-shared-nav>
          <a data-shared-dashboard href="../manager/dashboard.html">Dashboard</a>
          <a data-nav-link href="profile.html">Profile</a>
          <a data-nav-link href="notifications.html">Notifications</a>
          <a href="#" data-action="logout">Logout</a>
        </nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <h2>Notifications</h2>
          <div class="topbar-right">
            <button class="btn btn-ghost" id="mark-all-read-btn">Mark All Read</button>
            <a class="notification-link" aria-label="Notifications" href="notifications.html">
              Alerts
              <span class="count-pill" data-notification-count>0</span>
            </a>
            <div class="user-chip">
              <img data-current-avatar src="https://placehold.co/40x40" alt="avatar" />
              <div><strong data-current-user>-</strong><div data-current-role>-</div></div>
            </div>
          </div>
        </header>

        <article class="card">
          <div class="section-head">
            <h3>Recent Notifications</h3>
          </div>
          <p class="muted-note">Stay updated with new tasks, assignments, and completions.</p>
          <div id="notifications-list" class="notifications-list"></div>
        </article>
      </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../../js/socket.js"></script>
    <script src="../../js/notifications.js"></script>
    <script>
      (async function init() {
        const auth = window.TeamFlow.auth.requireAuth(["manager", "team-lead", "developer"]);
        if (!auth) return;

        window.TeamFlow.auth.renderSharedSidebar(auth.user);
        window.TeamFlow.auth.setSharedDashboardLink(auth.user);
        window.TeamFlow.utils.setUserHeader(auth.user);
        window.TeamFlow.utils.highlightNav();

        const logoutBtn = document.querySelector("[data-action=logout]");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", (event) => {
            event.preventDefault();
            window.TeamFlow.auth.logout();
          });
        }

        window.TeamFlow.socket.connectSocket();
        await window.TeamFlow.notifications.initGlobalNotifications();
        await window.TeamFlow.notifications.initNotificationsPage();
      })();
    </script>
  </body>
</html>
