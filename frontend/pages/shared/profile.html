<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | TeamFlow Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">TeamFlow Hub</div>
        <nav data-shared-nav>
          <a data-shared-dashboard href="../manager/dashboard.html">Dashboard</a>
          <a data-nav-link href="profile.html">Profile</a>
          <a data-nav-link href="notifications.html">Notifications</a>
          <a href="#" data-action="logout">Logout</a>
        </nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <h2>My Profile</h2>
          <div class="topbar-right">
            <a class="notification-link" aria-label="Notifications" href="notifications.html">
              Notifications
              <span class="count-pill" data-notification-count>0</span>
            </a>
            <div class="user-chip">
              <img id="profile-preview" data-current-avatar src="https://placehold.co/80x80" alt="avatar" />
              <div><strong data-current-user>-</strong><div data-current-role>-</div></div>
            </div>
          </div>
        </header>

        <section class="grid profile-layout">
          <article class="card">
            <h3>Update Profile</h3>
            <p class="muted-note">Keep your personal details up to date.</p>
            <form id="profile-form" class="grid form-top-gap">
              <label class="form-control">
                Name
                <input id="profile-name" type="text" name="name" minlength="3" />
              </label>
              <label class="form-control">
                Email
                <input id="profile-email" type="email" name="email" readonly />
              </label>
              <label class="form-control">
                Profile Image
                <input id="profile-image" type="file" name="profileImg" accept="image/*" />
              </label>
              <button class="btn btn-primary" type="submit">Save Profile</button>
            </form>
          </article>

          <article class="card">
            <h3>Account Details</h3>
            <ul class="account-list">
              <li><strong>Role</strong><span id="profile-role">-</span></li>
              <li><strong>Status</strong><span id="profile-status">-</span></li>
              <li><strong>Team</strong><span id="profile-team">-</span></li>
            </ul>

            <hr class="section-rule" />

            <h3>Change Password</h3>
            <form id="password-form" class="grid form-top-gap">
              <label class="form-control">
                Current Password
                <input type="password" name="currentPassword" required minlength="6" />
              </label>
              <label class="form-control">
                New Password
                <input type="password" name="newPassword" required minlength="6" />
              </label>
              <label class="form-control">
                Confirm Password
                <input type="password" name="passwordConfirm" required minlength="6" />
              </label>
              <button class="btn btn-primary" type="submit">Update Password</button>
            </form>
          </article>
        </section>
      </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../../js/socket.js"></script>
    <script src="../../js/notifications.js"></script>
    <script src="../../js/users.js"></script>
    <script>
      window.TeamFlow.users.initProfilePage();
    </script>
  </body>
</html>
